<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --accent: #a78bfa; --glow: rgba(167, 139, 250, 0.4); }

        body { 
            background: radial-gradient(circle at top right, #0f172a, #020617); 
            background-attachment: fixed;
            height: 100vh;
            color: white; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        
        .main-container { width: 100%; max-width: 448px; display: flex; flex-direction: column; height: 100%; padding: 16px; }

        .glass-player { 
            background: rgba(30, 27, 75, 0.5); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(167, 139, 250, 0.2); 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--glow);
        }
        
        .station-card { 
            background: rgba(30, 27, 75, 0.35); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.1);
            transition: all 0.3s ease;
        }

        .station-card.active { 
            background: rgba(167, 139, 250, 0.2); 
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(167, 139, 250, 0.25);
            transform: translateY(-2px);
        }

        .logo-display-container { width: 130px; height: 130px; margin: 0 auto 20px auto; position: relative; display: flex; align-items: center; justify-content: center; }

        .logo-frame {
            width: 100%; height: 100%; background: transparent; border-radius: 30px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10; overflow: hidden; transition: all 0.5s ease;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px var(--glow), inset 0 0 5px var(--glow); border-color: rgba(167, 139, 250, 0.4); }
            50% { box-shadow: 0 0 25px var(--accent), inset 0 0 15px var(--accent); border-color: var(--accent); }
            100% { box-shadow: 0 0 5px var(--glow), inset 0 0 5px var(--glow); border-color: rgba(167, 139, 250, 0.4); }
        }

        .playing-frame { animation: pulse-border 2s infinite ease-in-out; }

        .scroll-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 8px; }

        .stations-scroll-area {
            flex: 1; overflow-y: auto; padding: 10px 4px 140px 4px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .stations-scroll-area::-webkit-scrollbar { display: none; }

        .bars-container { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .bar { width: 2px; background: var(--accent); animation: play 0.8s infinite alternate; display: none; }
        .active .bar { display: block; }
        @keyframes play { from { height: 2px; } to { height: 12px; } }

        .logo-box { width: 55px; height: 55px; border-radius: 12px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .station-logo { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="text-center py-2 shrink-0">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic text-white/90">Radio <span class="text-purple-400">Center</span></h1>
        </div>

        <div class="glass-player rounded-[2.5rem] p-6 text-center mb-6 shrink-0 relative">
            <div class="logo-display-container">
                <div id="logo-frame" class="logo-frame">
                    <img id="main-logo-display" src="" class="w-full h-full object-contain p-4 hidden" alt="Logo">
                    <i id="main-icon-placeholder" class="fas fa-broadcast-tower text-4xl text-slate-700/50"></i>
                </div>
            </div>
            
            <h2 id="current-name" class="text-lg font-bold truncate text-white">Choose your radio station</h2>
            <div class="flex justify-center items-center gap-2 mt-1">
                <div id="live-indicator" class="w-1.5 h-1.5 bg-slate-600 rounded-full"></div>
                <p id="status-text" class="text-[9px] text-purple-300/60 uppercase tracking-widest font-black">Offline</p>
            </div>
            
            <div class="mt-6 flex items-center justify-center gap-8">
                <button onclick="changeStation('prev')" class="p-3 text-slate-400 active:scale-75"><i class="fas fa-backward-step text-lg"></i></button>
                <button onclick="togglePlay()" id="play-btn" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center shadow-2xl active:scale-90">
                    <i id="play-icon" class="fas fa-play text-xl ml-1"></i>
                </button>
                <button onclick="changeStation('next')" class="p-3 text-slate-400 active:scale-75"><i class="fas fa-forward-step text-lg"></i></button>
            </div>
        </div>

        <div class="scroll-section">
            <div class="flex justify-between items-center mb-4 px-4 shrink-0">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-purple-300/80 italic">Station Live</h3>
                <span id="station-count" class="text-[9px] bg-black/40 px-3 py-1 rounded-full text-purple-200 border border-purple-500/20">0 stations</span>
            </div>
            <div class="stations-scroll-area" id="stations-list"></div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const stations = [
            { name: "M Plus-NT 88,6 FM", url: "https://s4.ssl-stream.com:7880/live", logo: "img/logo_radiomplus.webp" },
            { name: "Jurnal FM-NT 92 FM", url: "https://ssl.radios.show:7009/stream", logo: "img/logo_jurnal_fm.png" },
            { name: "Viva FM-NT 94,7 FM", url: "https://cloud.radiosonicpanel.ro:8008/stream", logo: "img/viva.png" },
            { name: "Radio Terra-NT 89,8 FM", url: "https://stream.terrafm.ro/stream", logo: "img/terrafm.png" },
            { name: "Europa FM-B", url: "https://astreaming.edi.ro:8443/EuropaFM_aac", logo: "img/europafm.png" },
            { name: "Kiss FM-B", url: "https://live.kissfm.ro/kissfm.aacp", logo: "img/kissfm.png" },
            { name: "Magic FM-B", url: "https://live.magicfm.ro/magicfm.aacp", logo: "img/magicfm.png" },
            { name: "Digi FM-B", url: "https://edge76.rcs-rds.ro/digifm/digifm.mp3", logo: "img/digifm.png" },
            { name: "Digi 24FM-B", url: "https://edge76.rcs-rds.ro/digifm/digi24fm.mp3", logo: "img/digi24fm.png" },
            { name: "Pro FM-B", url: "https://edge126.rcs-rds.ro/profm/profm.mp3", logo: "img/profm.png" },
            { name: "Rock FM-B", url: "https://live.rockfm.ro/rockfm.aacp", logo: "img/rockfm.png" },
            { name: "Dance FM-B", url: "https://edge126.rcs-rds.ro/profm/dancefm.mp3", logo: "img/dancefm.png" },
            { name: "Subasio-IT", url: "http://icy.unitedradio.it/Subasio.mp3", logo: "img/subasio.png" },
            { name: "SubasioPlus-IT", url: "http://icy.unitedradio.it/SubasioPiu.mp3", logo: "img/subasiopiu.png" },
            { name: "Country-USA", url: "https://azura.ebsmedia.ro/listen/country/country128.mp3", logo: "img/countryny.png" },
            { name: "Country NY -USA", url: "https://stream.revma.ihrhls.com/zc1521", logo: "img/country100_5.png" }
        ];

        const player = document.getElementById('audio-player');
        const playIcon = document.getElementById('play-icon');
        const statusText = document.getElementById('status-text');
        const nameDisplay = document.getElementById('current-name');
        const liveIndicator = document.getElementById('live-indicator');
        const logoFrame = document.getElementById('logo-frame');
        const mainLogoDisplay = document.getElementById('main-logo-display');
        const mainIconPlaceholder = document.getElementById('main-icon-placeholder');
        let currentStationIdx = 0;

        function init() {
            document.getElementById('station-count').innerText = `${stations.length} STATIONS`;
            const list = document.getElementById('stations-list');
            list.innerHTML = ""; 
            stations.forEach((s, idx) => {
                const card = document.createElement('div');
                card.className = "station-card p-4 rounded-[1.5rem] flex items-center gap-4 mb-4 cursor-pointer";
                card.id = `station-${idx}`;
                card.onclick = () => select(idx);
                card.innerHTML = `<div class="logo-box"><img src="${s.logo}" class="station-logo" onerror="this.src='https://ui-avatars.com/api/?name=${s.name.charAt(0)}&background=1e1b4b&color=fff'"></div><div class="flex-1 min-w-0"><p class="font-bold text-white text-md truncate">${s.name}</p><div class="bars-container mt-1.5"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>`;
                list.appendChild(card);
            });
            player.volume = 1.0;
        }

        function select(idx) {
            currentStationIdx = idx;
            const s = stations[idx];
            mainLogoDisplay.src = s.logo;
            mainLogoDisplay.classList.remove('hidden');
            mainIconPlaceholder.classList.add('hidden');
            statusText.innerText = "Connection...";
            nameDisplay.innerText = s.name;
            liveIndicator.className = "w-1.5 h-1.5 bg-purple-400 rounded-full animate-pulse";
            document.querySelectorAll('.station-card').forEach((c, i) => c.classList.toggle('active', i === idx));
            
            player.src = s.url;
            player.load();
            play();
            
            // Aceasta este cheia pentru ecranul de blocat
            setupMediaSession(s);
            
            document.getElementById(`station-${idx}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function togglePlay() { if (!player.src) { select(0); return; } player.paused ? play() : pause(); }

        function play() {
            player.play().then(() => {
                playIcon.className = "fas fa-pause text-xl";
                statusText.innerText = "On Air";
                liveIndicator.className = "w-1.5 h-1.5 bg-red-500 rounded-full shadow-[0_0_8px_#ef4444]";
                logoFrame.classList.add('playing-frame');
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
            }).catch(() => { statusText.innerText = "Offline"; });
        }

        function pause() {
            player.pause();
            playIcon.className = "fas fa-play text-xl ml-1";
            statusText.innerText = "Pause";
            liveIndicator.className = "w-1.5 h-1.5 bg-slate-600 rounded-full";
            logoFrame.classList.remove('playing-frame');
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        }

        function changeStation(direction) {
            let next = direction === 'next' ? currentStationIdx + 1 : currentStationIdx - 1;
            if (next >= stations.length) next = 0;
            if (next < 0) next = stations.length - 1;
            select(next);
        }

        // --- CONFIGURARE MEDIA SESSION AVANSATĂ ---
        function setupMediaSession(s) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: s.name,
                    artist: 'Radio Center',
                    album: 'Streaming',
                    artwork: [
                        { src: s.logo, sizes: '96x96',   type: 'image/webp' },
                        { src: s.logo, sizes: '512x512', type: 'image/webp' }
                    ]
                });

                // Handlers pentru butoanele de pe ecranul blocat/volan
                const actionHandlers = [
                    ['play', () => play()],
                    ['pause', () => pause()],
                    ['previoustrack', () => changeStation('prev')],
                    ['nexttrack', () => changeStation('next')],
                    ['stop', () => pause()]
                ];

                for (const [action, handler] of actionHandlers) {
                    try {
                        navigator.mediaSession.setActionHandler(action, handler);
                    } catch (error) {
                        console.log(`Eroare handler ${action}:`, error);
                    }
                }
            }
        }

        init();
    </script>
</body>
</html>
